[test]
root = "tests/integration"
timeout = 120000
coverageReporter = ["text", "lcov"]
coverageDir = "coverage/int"
coverageSkipTestFiles = true
# Int ledger = the adapters tier only; the domain is the unit ledger, the glue is not an adapter, tests/** never counts.
coveragePathIgnorePatterns = ["src/index.ts", "src/lib/**", "tests/**"]
