# ### bun-lib-reusable-publish
# #### source: bun-lib
name: ⚡ Reusable Publish

on:
  workflow_call:
    secrets:
      NPM_API_KEY:
        required: true

jobs:
  publish:
    name: Publish to npm
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache-linux-amd64
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      - uses: AtomiCloud/actions.cache-bun@v2
      - name: Publish library
        env:
          NPM_API_KEY: ${{ secrets.NPM_API_KEY }}
        run: nix develop .#cd -c ./scripts/ci/publish.sh
