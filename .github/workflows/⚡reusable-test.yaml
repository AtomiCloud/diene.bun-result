# ### bun-base-reusable-test
# #### source: bun-base
name: ⚡ Reusable Tests

on:
  workflow_call:
    inputs:
      mode:
        description: Test mode to run (unit, int, or conditional meta)
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: ${{ inputs.mode == 'int' && 'Integration Tests' || inputs.mode == 'meta' && 'Meta Tests' || 'Unit Tests' }}
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache-linux-amd64
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      - uses: AtomiCloud/actions.cache-bun@v2
      - name: Run ${{ inputs.mode }} tests
        env:
          TEST_MODE: ${{ inputs.mode }}
        run: nix develop .#ci -c ./scripts/ci/test.sh "$TEST_MODE"
      - name: Upload ${{ inputs.mode }} coverage artifact
        if: ${{ always() && hashFiles(format('coverage/{0}/lcov.info', inputs.mode)) != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ inputs.mode }}
          path: coverage/${{ inputs.mode }}
          if-no-files-found: warn
      - name: Upload ${{ inputs.mode }} coverage to Codecov
        if: ${{ always() && hashFiles(format('coverage/{0}/lcov.info', inputs.mode)) != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@v7
        with:
          files: coverage/${{ inputs.mode }}/lcov.info
          flags: ${{ inputs.mode }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true
