# ### workspace-root
# #### source: workspace
version: '3'

includes:
  secret: tasks/Taskfile.secret.yaml
  # ### bun-base-test-includes
  # #### source: bun-base
  unit:
    taskfile: tasks/Taskfile.test.yaml
    vars:
      MODE: unit
      CONFIG: bunfig.unit.toml
  int:
    taskfile: tasks/Taskfile.test.yaml
    vars:
      MODE: int
      CONFIG: bunfig.int.toml
  # ### bun-lib-test-includes
  # #### source: bun-lib
  meta:
    taskfile: tasks/Taskfile.test.yaml
    vars:
      MODE: meta
      CONFIG: bunfig.meta.toml

tasks:
  setup:
    desc: Set up generated workspace assets
    cmds:
      - ./scripts/local/skills-sync.sh
      # ### bun-base-setup
      # #### source: bun-base
      - ./scripts/local/setup.sh

  lint:
    desc: Run all repository gates
    cmds:
      - pre-commit run --all-files

  skills:sync:
    desc: Synchronize installed diene package skills
    cmds:
      - ./scripts/local/skills-sync.sh

  # ### bun-base-tasks
  # #### source: bun-base
  clean:
    desc: Remove Bun build, dependency, and coverage artifacts
    cmds:
      - rm -rf dist coverage
      - '[ -d node_modules ] && find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + || true'

  build:
    desc: Build the publishable library (ESM + CJS + types) to dist/
    cmds:
      - ./scripts/local/build.sh

  deadcode:
    desc: Review strict and LLM-assisted dead-code findings
    cmds:
      - ./scripts/local/deadcode.sh

  test:
    desc: Run unit and meta suites without coverage
    cmds:
      - task: unit:default
      - task: meta:default

  test:unit:
    desc: Run the unit suite without coverage
    cmds:
      - task: unit:default

  test:int:
    desc: Confirm that this dependency-free library has no integration tier
    cmds:
      - echo "⏭️ No integration tier (this package has no adapters or external dependencies)"

  # ### bun-lib-meta-tasks
  # #### source: bun-lib
  test:meta:
    desc: Run the TestHelper meta suite when a TestHelper exists
    cmds:
      - task: meta:default

  test:coverage:
    desc: Run unit and meta suites with coverage
    cmds:
      - task: unit:coverage
      - task: meta:coverage

  test:unit:coverage:
    desc: Run the unit suite with coverage
    cmds:
      - task: unit:coverage

  test:int:coverage:
    desc: Confirm that this dependency-free library has no integration coverage ledger
    cmds:
      - echo "⏭️ No integration coverage ledger (this package has no adapters or external dependencies)"

  test:meta:coverage:
    desc: Run the TestHelper meta suite with coverage when a TestHelper exists
    cmds:
      - task: meta:coverage

  test:watch:
    desc: Watch the fast unit suite
    cmds:
      - task: unit:watch

  run:
    desc: Run the Bun source entry point
    cmds:
      - bun run ./src/index.ts -- {{.CLI_ARGS}}

  preview:
    desc: Build and run the bundled Bun artifact
    deps: [build]
    cmds:
      - bun run ./dist/index.js -- {{.CLI_ARGS}}
