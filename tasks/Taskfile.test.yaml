version: '3'
vars:
  MODE: '{{.MODE | default "unit"}}'
  CONFIG: '{{.CONFIG | default "bunfig.unit.toml"}}'
tasks:
  # Internal building blocks — parameterized by MODE/CONFIG and reached only via the test:* root tasks.
  default:
    internal: true
    desc: 'Run {{.MODE}} tests'
    cmds:
      - |
        if [ "{{.MODE}}" = "meta" ]; then
          ./scripts/local/test-meta.sh "{{.CONFIG}}"
        else
          bun test --config={{.CONFIG}}
        fi
  coverage:
    internal: true
    desc: 'Run {{.MODE}} tests with coverage (lcov + text artifacts)'
    cmds:
      - |
        test_status=0
        if [ "{{.MODE}}" = "meta" ]; then
          ./scripts/local/test-meta.sh "{{.CONFIG}}" coverage || test_status=$?
        else
          bun test --config={{.CONFIG}} --coverage || test_status=$?
        fi
        ./scripts/local/coverage-check.sh "{{.MODE}}"
        [ "${test_status}" -eq 0 ] || exit "${test_status}"
  watch:
    internal: true
    desc: 'Run {{.MODE}} tests in watch mode'
    cmds:
      - bun test --config={{.CONFIG}} --watch
